name: 每周检查 GetRealStocks 数据源更新

on:
  schedule:
    # 每周一北京时间上午 9 点（UTC 1 点）
    - cron: "0 1 * * 1"
  workflow_dispatch: {}   # 允许手动触发，方便测试

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 运行比对脚本
        id: check
        run: |
          set +e
          python3 scripts/check_getrealstocks.py
          code=$?
          set -e
          if [ "$code" = "42" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" != "0" ]; then
            exit $code
          fi

      - name: 提交新快照
        if: steps.check.outputs.changed == 'true' || hashFiles('scripts/getrealstocks-snapshot.txt') == ''
        run: |
          git config user.name "grs-monitor"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/getrealstocks-snapshot.txt
          git diff --cached --quiet || git commit -m "chore: 更新 GetRealStocks 快照"
          git push
        env:
          GIT_AUTHOR_NAME: grs-monitor

      - name: 有变化时创建 Issue 提醒
        if: steps.check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.existsSync('diff.txt') ? fs.readFileSync('diff.txt','utf8') : '(diff 为空)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 GetRealStocks 数据源有更新（${new Date().toISOString().slice(0,10)}）`,
              body: [
                '监控脚本检测到 [GetRealStocks.com](https://getrealstocks.com/) 页面内容发生变化。',
                '',
                '**请人工核对以下差异**，确认是否需要同步更新 `index.html` 中的平台数据（JS 里的 `platforms` 数组）：',
                '',
                '```diff',
                diff.slice(0, 6000),
                '```',
                '',
                '确认无需更新可直接关闭本 Issue。'
              ].join('\n')
            });
