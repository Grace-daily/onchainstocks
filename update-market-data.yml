name: Refresh market overview

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch Get Real Stocks market metrics
        run: node scripts/update-market-data.mjs
      - name: Commit refreshed snapshot
        run: |
          if git diff --quiet -- data/market.json data/market-data.js; then
            echo "Market snapshot unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json data/market-data.js
          git commit -m "chore: refresh market overview"
          git push
